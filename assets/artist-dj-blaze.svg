<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e8ff"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg1)" rx="20"/>
  <ellipse cx="200" cy="220" rx="160" ry="140" fill="url(#glow1)"/>
  <!-- Turntable base -->
  <ellipse cx="200" cy="340" rx="110" ry="28" fill="#ede9fe" stroke="url(#accent1)" stroke-width="2"/>
  <ellipse cx="200" cy="332" rx="90" ry="20" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.2"/>
  <circle cx="200" cy="328" r="7" fill="#7c3aed" opacity="0.7"/>
  <!-- Vinyl grooves -->
  <circle cx="200" cy="328" r="30" fill="none" stroke="#c4b5fd" stroke-width="0.5" opacity="0.4"/>
  <circle cx="200" cy="328" r="50" fill="none" stroke="#c4b5fd" stroke-width="0.5" opacity="0.3"/>
  <circle cx="200" cy="328" r="70" fill="none" stroke="#c4b5fd" stroke-width="0.5" opacity="0.2"/>
  <!-- DJ silhouette - torso -->
  <path d="M160 260 Q165 200 200 180 Q235 200 240 260 Z" fill="#ede9fe" stroke="url(#accent1)" stroke-width="2"/>
  <!-- Head -->
  <circle cx="200" cy="155" r="34" fill="#f5f3ff" stroke="url(#accent1)" stroke-width="2"/>
  <!-- Headphones -->
  <path d="M166 146 Q162 122 166 108 Q180 88 200 85 Q220 88 234 108 Q238 122 234 146" fill="none" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"/>
  <rect x="158" y="136" width="14" height="20" rx="6" fill="#7c3aed" opacity="0.6"/>
  <rect x="228" y="136" width="14" height="20" rx="6" fill="#ec4899" opacity="0.6"/>
  <!-- Arms -->
  <path d="M160 240 Q132 278 148 318" fill="none" stroke="url(#accent1)" stroke-width="3" stroke-linecap="round"/>
  <path d="M240 240 Q268 278 252 318" fill="none" stroke="url(#accent1)" stroke-width="3" stroke-linecap="round"/>
  <!-- Sound wave arcs -->
  <path d="M82 180 Q64 200 82 225" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.4"/>
  <path d="M64 172 Q42 205 64 238" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.25"/>
  <path d="M318 180 Q336 200 318 225" fill="none" stroke="#f9a8d4" stroke-width="2" opacity="0.4"/>
  <path d="M336 172 Q358 205 336 238" fill="none" stroke="#fbcfe8" stroke-width="1.5" opacity="0.25"/>
  <!-- Decorative dots -->
  <circle cx="95" cy="105" r="4" fill="#a78bfa" opacity="0.3"/>
  <circle cx="310" cy="118" r="3" fill="#f9a8d4" opacity="0.4"/>
  <circle cx="78" cy="300" r="3" fill="#c4b5fd" opacity="0.3"/>
  <circle cx="330" cy="285" r="4" fill="#fbcfe8" opacity="0.35"/>
  <circle cx="120" cy="380" r="2.5" fill="#7c3aed" opacity="0.2"/>
  <circle cx="290" cy="390" r="3" fill="#ec4899" opacity="0.2"/>
  <!-- Name -->
  <text x="200" y="435" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="26" fill="#7c3aed" letter-spacing="3">DJ BLAZE</text>
  <text x="200" y="458" text-anchor="middle" font-family="sans-serif" font-weight="500" font-size="12" fill="#a78bfa" letter-spacing="2">ELECTRONIC HEADLINER</text>
</svg>

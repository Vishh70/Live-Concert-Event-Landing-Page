<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <defs>
        <linearGradient id="mapBg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f5f3ff"/>
            <stop offset="100%" stop-color="#fdf2f8"/>
        </linearGradient>
        <linearGradient id="stageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7c3aed"/>
            <stop offset="50%" stop-color="#ec4899"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
    </defs>
    <rect width="800" height="500" fill="url(#mapBg)" rx="16"/>
    <!-- Outer venue boundary -->
    <rect x="40" y="40" width="720" height="420" rx="20" fill="none" stroke="#d4d4d8" stroke-width="1.5" stroke-dasharray="8,4"/>
    <!-- Stage -->
    <rect x="250" y="55" width="300" height="80" rx="12" fill="url(#stageGrad)" opacity="0.9"/>
    <text x="400" y="103" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="20" fill="white" letter-spacing="4">MAIN STAGE</text>
    <!-- VIP Zone -->
    <rect x="280" y="160" width="240" height="65" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="400" y="198" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="15" fill="#7c3aed" letter-spacing="2">VIP ZONE</text>
    <!-- General standing -->
    <rect x="120" y="255" width="560" height="95" rx="10" fill="#faf5ff" stroke="#a1a1aa" stroke-width="1"/>
    <text x="400" y="310" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="16" fill="#71717a" letter-spacing="2">GENERAL STANDING</text>
    <!-- Food court -->
    <rect x="60" y="390" width="190" height="48" rx="8" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.2"/>
    <text x="155" y="419" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="13" fill="#ec4899" letter-spacing="1">🍔  FOOD COURT</text>
    <!-- Merch zone -->
    <rect x="550" y="390" width="190" height="48" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.2"/>
    <text x="645" y="419" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="13" fill="#f97316" letter-spacing="1">🎸  MERCH ZONE</text>
    <!-- Medical -->
    <rect x="300" y="390" width="95" height="48" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2"/>
    <text x="347" y="419" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="12" fill="#7c3aed">🏥  FIRST AID</text>
    <!-- Restrooms -->
    <rect x="410" y="390" width="120" height="48" rx="8" fill="#f5f5f5" stroke="#a1a1aa" stroke-width="1"/>
    <text x="470" y="419" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="12" fill="#71717a">🚻  RESTROOMS</text>
    <!-- Entry gates -->
    <rect x="50" y="178" width="50" height="38" rx="6" fill="#7c3aed" opacity="0.85"/>
    <text x="75" y="202" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="12" fill="white">GATE A</text>
    <rect x="60" y="448" width="48" height="6" rx="3" fill="#ec4899" opacity="0.6"/>
    <text x="84" y="467" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="10" fill="#ec4899">GATE B</text>
    <rect x="692" y="448" width="48" height="6" rx="3" fill="#ec4899" opacity="0.6"/>
    <text x="716" y="467" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="10" fill="#ec4899">GATE C</text>
    <!-- Sound towers -->
    <circle cx="130" cy="198" r="9" fill="none" stroke="#f9a8d4" stroke-width="1.2"/>
    <text x="130" y="202" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ec4899">🔊</text>
    <circle cx="670" cy="198" r="9" fill="none" stroke="#f9a8d4" stroke-width="1.2"/>
    <text x="670" y="202" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ec4899">🔊</text>
    <!-- Title -->
    <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="13" fill="#a1a1aa" letter-spacing="3">PHOENIX CONCERT GROUNDS — VENUE MAP</text>
</svg>
